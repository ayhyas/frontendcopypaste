<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipShare — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <!-- Animated background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
        </div>
        <span class="logo-text">ClipShare</span>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign in</button>
        <button class="auth-tab" data-tab="register">Create account</button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form active" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-error" id="loginError"></div>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">
          <span class="btn-text">Sign in</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

      <!-- Register form -->
      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="regUsername">Username</label>
          <input class="form-input" type="text" id="regUsername" placeholder="your_username" autocomplete="username" required />
          <span class="form-hint">Letters, numbers, and underscores only</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" required />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>
        <div class="form-error" id="registerError"></div>
        <button type="submit" class="btn-primary btn-full" id="registerBtn">
          <span class="btn-text">Create account</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
