<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipShare — Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="board-page">

  <!-- ─── Navbar ─────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-brand">
      <div class="logo-icon logo-icon-sm">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
      </div>
      <span class="logo-text">ClipShare</span>
    </div>
    <div class="nav-center">
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span class="status-text">Connecting…</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-user" id="navUser">
        <div class="avatar" id="navAvatar"></div>
        <span class="nav-username" id="navUsername"></span>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <!-- ─── Paste zone hero ────────────────────────────────────────────── -->
  <div class="paste-hero" id="pasteHero">
    <div class="paste-hero-inner">
      <div class="paste-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
      </div>
      <div class="paste-hero-text">
        <h2>Press <kbd>Ctrl</kbd><span>+</span><kbd>V</kbd> anywhere to share</h2>
        <p>Paste text, code, images, links, or files — drag &amp; drop files anywhere</p>
      </div>
      <div class="paste-hero-actions">
        <button class="btn-new-clip" id="newClipBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Write clip
        </button>
        <button class="btn-upload-file" id="uploadFileBtn" title="Upload a file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload file
        </button>
      </div>
      <input type="file" id="fileInput" hidden multiple />
    </div>
  </div>

  <!-- ─── Drag-and-drop overlay ───────────────────────────────────────── -->
  <div class="drag-drop-overlay" id="dragDropOverlay">
    <div class="drag-drop-inner">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drop files to share</p>
    </div>
  </div>

  <!-- ─── Main content ───────────────────────────────────────────────── -->
  <main class="board-main">
    <div class="board-header">
      <h3 class="board-title">All clips <span class="clip-count" id="clipCount"></span></h3>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
      </div>
      <p>No clips yet — be the first to share!</p>
    </div>

    <!-- Loading state -->
    <div class="loading-state" id="loadingState">
      <div class="loader"></div>
    </div>

    <!-- Clips grid -->
    <div class="clips-grid" id="clipsGrid"></div>

    <!-- Load more -->
    <div class="load-more-wrapper" id="loadMoreWrapper" style="display:none">
      <button class="btn-load-more" id="loadMoreBtn">Load more clips</button>
    </div>
  </main>

  <!-- ─── New clip modal ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h3 id="modalTitle">New clip</h3>
        <button class="modal-close" id="modalClose" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <textarea
          id="clipTextarea"
          class="clip-textarea"
          placeholder="Type or paste your content here…"
          rows="8"
          spellcheck="true"
        ></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn-primary" id="modalSubmitBtn">
          <span class="btn-text">Share clip</span>
          <span class="btn-spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ─── Image preview modal ────────────────────────────────────────── -->
  <div class="modal-overlay" id="imageOverlay">
    <div class="image-modal" role="dialog">
      <button class="modal-close image-modal-close" id="imageModalClose" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <img id="imageModalSrc" src="" alt="Full size preview" />
    </div>
  </div>

  <!-- ─── Toast container ────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ─── Scripts ────────────────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <!-- prism.min.js already bundles: core, markup, css, clike, javascript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <!-- Additional languages (order matters for deps: c before cpp, clike already in core) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
